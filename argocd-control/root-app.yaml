apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: note-app-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cvkiran123/Polyglot-GitOps-Flow.git
    targetRevision: HEAD
    path: k8s-manifests
    directory:
      recurse: true #  it looks into subfolders!
  destination:
    server: https://kubernetes.default.svc
    namespace: note-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true