apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-service # The name that shows in the Argo UI
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cvkiran123/Polyglot-GitOps-Flow.git
    targetRevision: HEAD
    path: k8-manifests/frontend # Only watches this service's folder
  destination:
    server: https://kubernetes.default.svc
    namespace: note-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true