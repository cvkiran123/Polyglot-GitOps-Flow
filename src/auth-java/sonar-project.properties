# Project Identification
sonar.projectKey=note-app-auth-java
sonar.projectName=Auth Service (Java Maven)
sonar.projectVersion=1.0

# Path to Source and Binaries (Crucial for Java)
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Exclusions (Standard Spring Boot)
sonar.exclusions=src/main/resources/**, **/test/**

# Coverage (Point to the JaCoCo report generated by Maven)
sonar.java.binaries=target/classes
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml